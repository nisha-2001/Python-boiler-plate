replicaCount: 1

image:
  repository: registry.falabella.tech/digital-retail/catalyst/osmos/relevancy/query-ranking-api

ingress:
  enabled: true
  hosts:
    - "*"

egress:
  enabled: true
  hosts:
    - "*.googleapis.com"

resources:
  requests:
    cpu: "100m"
    memory: "500Mi"
  limits:
    memory: "2Gi"

environmentVariables:
  DD_ENV: "dev"
  DD_SERVICE: "dev-query-ranking-api"
  DD_LOGS_INJECTION: true
  DD_PROFILING_ENABLED: true
  DD_TRACE_ENABLED: true
  DD_TAGS: "app:query-ranking-api,country:corp,domain:search"
  HOST: "0.0.0.0"

datadog:
  env: dev
  service: "dev-query-ranking-api"

gcp:
  enabled: false


workloadidentity:
  enabled: true
  k8ssvcacc: relevancy-sa

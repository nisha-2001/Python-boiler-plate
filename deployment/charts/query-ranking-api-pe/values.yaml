# Default values for query-ranking-api.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

autoscaling:
  enabled: false


image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent
  pullSecret:
    enabled: true
    registry: https://hub.docker.com
    username: username
    password: password

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 5000
  canary:
    name: beta
    enabled: false

ingress:
  enabled: true
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  uriPrefix: /pe/ranker/
  uriRewritePrefix: /
  hosts:
    - chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

egress:
  enabled: false
  hosts:
    - chart-example.local

pod:
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 60

nodeSelector: {}

tolerations: []

affinity: {}

environmentVariables: {}

datadog:
  env: ""

gcp:
  enabled: false

database:
  enabled: true

workloadidentity:
  enabled: true
  k8ssvcacc: relevancy-sa
